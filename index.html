<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wolf Hour Pro Terminal</title>
    <style>
        body { background: #050505; color: #00ff00; font-family: 'Courier New', monospace; margin: 0; padding: 20px; text-align: center; }
        .box { border: 1px solid #333; padding: 20px; margin: 10px auto; max-width: 400px; background: #0a0a0a; border-radius: 8px; }
        input { width: 90%; padding: 10px; margin: 5px; background: #111; border: 1px solid #444; color: #fff; border-radius: 5px; }
        button { width: 95%; padding: 12px; background: #008800; color: white; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 10px; }
        #ticker { position: fixed; bottom: 0; left: 0; width: 100%; background: #111; color: #fff; padding: 10px 0; border-top: 2px solid #00ff00; }
        .price-big { font-size: 2.5em; color: #fff; margin: 10px 0; }
    </style>
</head>
<body>

    <h2>🐺 WOLF HOUR PRO</h2>
    
    <div class="box">
        <div id="price" class="price-big">$00,000.00</div>
        <div id="status-msg">Waiting for Bitget API...</div>
    </div>

    <div class="box">
        <input type="text" id="apiKey" placeholder="Bitget API Key">
        <input type="password" id="apiSecret" placeholder="Bitget API Secret">
        <input type="password" id="passphrase" placeholder="API Passphrase">
        <input type="text" id="coin" value="BTC/USDT">
        <button onclick="startEngine()">START SECURE ENGINE</button>
    </div>

    <div id="ticker">
        <marquee id="ticker-text" scrollamount="6">Connecting to Global Market Ticker...</marquee>
    </div>

    <script>
        async function startEngine() {
            const data = {
                apiKey: document.getElementById('apiKey').value,
                apiSecret: document.getElementById('apiSecret').value,
                passphrase: document.getElementById('apiSecret').value, // Bitget Password
                coin: document.getElementById('coin').value
            };
            const res = await fetch('/start', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            const result = await res.json();
            if(result.status === 'success') alert("Engine Started, Bhai!");
        }

        setInterval(async () => {
            try {
                const res = await fetch('/status');
                const data = await res.json();
                document.getElementById('price').innerText = `$${data.price}`;
                document.getElementById('status-msg').innerText = data.message;
                document.getElementById('ticker-text').innerText = data.ticker_line;
            } catch (e) {}
        }, 5000);
    </script>
</body>
</html>
