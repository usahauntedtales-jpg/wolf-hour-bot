<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wolf Hour Pro Terminal</title>
    <style>
        body { background: #080808; color: #00ff00; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 15px; text-align: center; overflow-x: hidden; }
        .terminal { border: 1px solid #1a1a1a; padding: 25px; margin: 10px auto; max-width: 450px; background: #0d0d0d; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .price-display { font-size: 3em; color: #fff; font-weight: bold; margin: 15px 0; text-shadow: 0 0 10px rgba(255,255,255,0.2); }
        input { width: 90%; padding: 12px; margin: 8px 0; background: #151515; border: 1px solid #222; color: #fff; border-radius: 6px; outline: none; }
        button { width: 95%; padding: 15px; background: #00c853; color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 6px; font-size: 1em; text-transform: uppercase; margin-top: 10px; }
        .status-box { color: #888; font-size: 0.9em; margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        #ticker-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; color: #fff; padding: 12px 0; border-top: 1px solid #00ff00; font-family: monospace; z-index: 1000; }
    </style>
</head>
<body>

    <div style="margin-top: 20px;">
        <img src="https://img.icons8.com/color/96/wolf.png" width="50" style="vertical-align: middle;">
        <h2 style="display: inline; margin-left: 10px; letter-spacing: 2px;">WOLF HOUR PRO</h2>
    </div>
    
    <div class="terminal">
        <div id="status-msg" class="status-box">SYSTEM: WAITING FOR AUTHORIZATION</div>
        <div id="price" class="price-display">$00,000.00</div>
        <div id="live-signal" style="font-weight: bold; font-size: 1.1em;">CONNECTING...</div>
    </div>

    <div class="terminal">
        <input type="text" id="apiKey" placeholder="BITGET API KEY">
        <input type="password" id="apiSecret" placeholder="BITGET API SECRET">
        <input type="password" id="passphrase" placeholder="API PASSPHRASE">
        <input type="text" id="coin" value="BTC/USDT">
        <button onclick="startEngine()">START SECURE ENGINE</button>
    </div>

    <div id="ticker-bar">
        <marquee id="scrolling-content" scrollamount="5">INITIALIZING MARKET TICKER DATA...</marquee>
    </div>

    <script>
        async function startEngine() {
            const btn = document.querySelector('button');
            btn.innerText = "STARTING...";
            const data = {
                apiKey: document.getElementById('apiKey').value,
                apiSecret: document.getElementById('apiSecret').value,
                passphrase: document.getElementById('passphrase').value,
                coin: document.getElementById('coin').value
            };
            const res = await fetch('/start', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            const result = await res.json();
            if(result.status === 'success') {
                alert("WOLF ENGINE DEPLOYED SUCCESSFULLY!");
                btn.innerText = "ENGINE ACTIVE";
                btn.style.background = "#222";
                btn.style.color = "#00ff00";
            } else {
                alert("ERROR: " + result.message);
                btn.innerText = "START SECURE ENGINE";
            }
        }

        setInterval(async () => {
            try {
                const res = await fetch('/status');
                const data = await res.json();
                document.getElementById('price').innerText = `$${data.price.toLocaleString()}`;
                document.getElementById('live-signal').innerText = data.message;
                document.getElementById('scrolling-content').innerHTML = data.ticker;
                
                // Color switching for signals
                if(data.last_signal === "BUY") document.getElementById('live-signal').style.color = "#00ff00";
                else if(data.last_signal === "SELL") document.getElementById('live-signal').style.color = "#ff3d00";
                else document.getElementById('live-signal').style.color = "#888";
            } catch (e) {}
        }, 5000);
    </script>
</body>
</html>
